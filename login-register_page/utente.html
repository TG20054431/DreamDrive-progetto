<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DreamDrive | Profilo Utente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../index_page/index_style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center">
          <img src="../index_page/logo_bianco.jpg" alt="DreamDrive" height="70">
        </a>
        <div class="d-flex">
          <button onclick="history.back()" class="btn btn-outline-light me-3 d-none d-md-block">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-return-left me-2" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M14.5 1.5a.5.5 0 0 1 .5.5v4.8a2.5 2.5 0 0 1-2.5 2.5H2.707l3.347 3.346a.5.5 0 0 1-.708.708l-4.2-4.2a.5.5 0 0 1 0-.708l4-4a.5.5 0 1 1 .708.708L2.707 8.3H12.5A1.5 1.5 0 0 0 14 6.8V2a.5.5 0 0 1 .5-.5"/>
            </svg>
            Indietro
          </button>
          <a href="../index_page/index.html" class="btn btn-outline-light me-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house-door-fill me-2" viewBox="0 0 16 16">
              <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"/>
            </svg>
            Home
          </a>
        </div>
      </div>
    </nav>

    <!-- Contenuto principale -->
    <div class="container mt-5" style="font-family: 'Tektur', sans-serif;">
      <div class="row">
        <!-- Profilo utente -->
        <div class="col-md-4 mb-4">
          <div class="card">
            <div class="card-body text-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-person-circle mb-3" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
              </svg>
              <h4 id="userName">Nome Utente</h4>
              <p id="userEmail">demo@example.com</p>
              <button class="btn btn-outline-danger w-100" onclick="logout()">Logout</button>
            </div>
          </div>
        </div>

        <!-- Prenotazioni -->
        <div class="col-md-8">
          <h3 class="mb-4">Le tue prenotazioni</h3>
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">Prenotazioni Attive</h5>
              <div id="activeBookings">
                <!-- Le prenotazioni verranno inserite dinamicamente -->
                <p class="text-muted">Nessuna prenotazione attiva</p>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Storico Prenotazioni</h5>
              <div id="bookingHistory">
                <!-- Lo storico verrà inserito dinamicamente -->
                <p class="text-muted">Nessuna prenotazione precedente</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="utility.js"></script>
    <script>
        function logout() {
            // Pulisci i dati di sessione
            localStorage.removeItem('loggedInUser');
            window.location.href = '../index_page/index.html';
        }

        // Funzione per visualizzare le prenotazioni
        function displayBookings() {
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            const activeContainer = document.getElementById('activeBookings');
            const historyContainer = document.getElementById('bookingHistory');
            
            if (bookings.length > 0) {
                const bookingsList = bookings.map(booking => `
                    <div class="booking-item mb-3 p-3 border rounded">
                        <h6>Servizio: ${booking.service}</h6>
                        <p>Data: ${new Date(booking.date).toLocaleDateString('it-IT')}</p>
                        <p>Auto: ${booking.car}</p>
                        ${booking.circuito ? `<p>Circuito: ${booking.circuito}</p>` : ''}
                        <p>Importo: €${booking.amount}</p>
                        <small class="text-muted">Pagamento effettuato il: ${new Date(booking.paymentDetails.timestamp).toLocaleString('it-IT')}</small>
                    </div>
                `).join('');
                
                activeContainer.innerHTML = bookingsList;
                historyContainer.innerHTML = '<p class="text-muted">Nessuna prenotazione precedente</p>';
            }
        }

        // Controlla se l'utente è loggato all'apertura della pagina
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth(); // Reindirizza al login se non autenticato
            
            // Mostra i dati dell'utente
            const user = getLoggedInUser();
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
            }
            
            displayBookings();
        });
    </script>
  </body>
</html>

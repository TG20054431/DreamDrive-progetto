    <div class="container mt-5">
      <h1 class="text-center mb-4">Completa il pagamento</h1>
      
      <div class="card mb-4 shadow">
        <div class="card-header">
          <h4 class="mb-0">Riepilogo ordine</h4>
        </div>
        <div class="card-body" id="summary-content">
          <div class="d-flex justify-content-between mb-2">
            <span>Servizio selezionato:</span>
            <span id="selected-service">-</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Data:</span>
            <span id="selected-date">-</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Ora:</span>
            <span id="selected-time">-</span>
          </div>
          <div class="d-flex justify-content-between fw-bold">
            <span>Totale da pagare:</span>
            <span id="total-amount">-</span>
          </div>
        </div>
      </div>
      
      <div class="card shadow">
        <div class="card-body">
          <h4 class="mb-4">Metodo di pagamento</h4>
          <form id="payment-form">
            <div class="mb-4">
              <div class="payment-methods">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="payment" id="credit" checked>
                  <label class="form-check-label" for="credit">Carta di credito</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="payment" id="paypal">
                  <label class="form-check-label" for="paypal">PayPal</label>
                </div>
              </div>
            </div>

            <div id="credit-card-fields">
              <div class="col-12">
                <label for="cardNumber" class="form-label">Numero carta</label>
                <input type="text" class="form-control" id="cardNumber" required>
              </div>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="expiry" class="form-label">Scadenza</label>
                  <input type="text" class="form-control" id="expiry" placeholder="MM/YY" required>
                </div>
                <div class="col-md-6">
                  <label for="cvv" class="form-label">CVV</label>
                  <input type="text" class="form-control" id="cvv" required>
                </div>
              </div>
              <div class="col-12">
                <label for="cardName" class="form-label">Intestatario carta</label>
                <input type="text" class="form-control" id="cardName" required>
              </div>
            </div>

            <div class="text-center mt-4">
              <button type="submit" class="btn btn-teal px-5">Paga ora</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="container mt-5">
      <h1 class="text-center mb-4">Contattaci</h1>
      <div class="row">
        <div class="col-md-6 mb-4">
          <div class="contact-info">
            <h2>Informazioni</h2>
            <p><strong>Indirizzo:</strong> Via Roma 123, Milano</p>
            <p><strong>Email:</strong> info@dreamdrive.com</p>
            <p><strong>Telefono:</strong> +39 02 1234567</p>
            <p><strong>Orari:</strong> Lun-Ven: 9:00-18:00</p>
            <div class="map-container mt-4">
              <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2798.854087832347!2d9.189723!3d45.464226!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zM40yNzAnMTUuMiJOIDnCsDExJzIzLjAiRQ!5e0!3m2!1sen!2sit!4v1620120000000!5m2!1sen!2sit"
                width="100%" 
                height="300" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
              </iframe>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="contact-form">
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Nome e Cognome</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="mb-3">
                <label for="subject" class="form-label">Oggetto</label>
                <input type="text" class="form-control" id="subject" required>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Messaggio</label>
                <textarea class="form-control" id="message" rows="5" required></textarea>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-teal px-5">Invia</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
